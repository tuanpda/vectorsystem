# /etc/nginx/sites-available/vectorsystem.io.vn.conf
# Domain: vectorsystem.io.vn → VPS 42.96.4.203
#
# sudo cp deploy/nginx/vectorsystem.io.vn.conf /etc/nginx/sites-available/
# sudo ln -sf /etc/nginx/sites-available/vectorsystem.io.vn.conf /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
# sudo certbot --nginx -d vectorsystem.io.vn -d www.vectorsystem.io.vn

server {
    listen 80;
    server_name vectorsystem.io.vn www.vectorsystem.io.vn;
    return 301 https://vectorsystem.io.vn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.vectorsystem.io.vn;
    return 301 https://vectorsystem.io.vn$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vectorsystem.io.vn;

    # Certbot sẽ tự chèn sau: certbot --nginx -d vectorsystem.io.vn
    # ssl_certificate     /etc/letsencrypt/live/vectorsystem.io.vn/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/vectorsystem.io.vn/privkey.pem;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

# /etc/nginx/sites-available/vectorsystem.io.vn.conf
# Domain: vectorsystem.io.vn
#
# 1) Trước SSL (chỉ HTTP):
#    sudo cp ... && sudo nginx -t && sudo systemctl reload nginx
# 2) Sau đó certbot tự thêm HTTPS + redirect:
#    sudo certbot --nginx -d vectorsystem.io.vn -d www.vectorsystem.io.vn

server {
    listen 80;
    server_name vectorsystem.io.vn www.vectorsystem.io.vn;

    client_max_body_size 100M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}

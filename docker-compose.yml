services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mk-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: mk
      POSTGRES_PASSWORD: mk_secret
      POSTGRES_DB: knowledge
    volumes:
      - mk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mk -d knowledge"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: mk-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - mk_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    # VPS CPU cũ (không có x86-64-v2): bắt buộc tag -cpuv1, không dùng :latest
    # https://github.com/minio/minio/issues/18365
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z-cpuv1
    container_name: mk-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      MINIO_ROOT_USER: mkminio
      MINIO_ROOT_PASSWORD: mkminio_secret
    volumes:
      - mk_minio_data:/data
    # Image minio/minio:latest không còn curl; mc có thể không có trong image server.
    # Không dùng healthcheck — minio-init tự đợi MinIO sẵn sàng (xem entrypoint bên dưới).
    healthcheck:
      disable: true

  # Tạo bucket mặc định khi MinIO sẵn sàng
  minio-init:
    # mc không có tag cùng ngày với minio — dùng cpuv1 gần nhất (Docker Hub)
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z-cpuv1
    container_name: mk-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      echo 'Waiting for MinIO...';
      for i in $$(seq 1 60); do
        if mc alias set local http://minio:9000 mkminio mkminio_secret 2>/dev/null; then
          break;
        fi;
        sleep 2;
      done;
      mc mb -p local/knowledge || true;
      mc anonymous set download local/knowledge || true;
      echo 'Bucket knowledge ready';
      "

volumes:
  mk_postgres_data:
  mk_redis_data:
  mk_minio_data:
